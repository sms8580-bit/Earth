<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Stream Live Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0c0e;
            --surface-color: rgba(255, 255, 255, 0.03);
            --accent-color: #ff0055;
            --accent-glow: rgba(255, 0, 85, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #a0a0ab;
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition-speed: 0.3s;
            --live-color: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% 0%, #1a1a2e, #0c0c0e);
            padding: 1.5rem 0;
        }

        .container {
            width: 98%;
            max-width: 1800px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 10;
        }

        header {
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            background: linear-gradient(90deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 0.5rem;
            animation: fadeIn 1s ease-out;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            backdrop-filter: blur(5px);
        }

        .badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--live-color);
            box-shadow: 0 0 8px var(--live-color);
            animation: pulse 1.5s infinite;
        }

        .badge.visitor-badge {
            color: var(--text-secondary);
        }

        .badge.live-badge {
            color: var(--live-color);
            font-weight: 600;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 1rem;
            width: 100%;
        }

        @media (max-width: 800px) {
            .grid-container {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }
        }

        .video-card {
            background: var(--surface-color);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: transform var(--transition-speed), border-color var(--transition-speed);
        }

        .video-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .card-controls {
            padding: 0.6rem;
            display: flex;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.2);
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            padding: 0.4rem 0.8rem;
            color: white;
            font-size: 0.8rem;
            outline: none;
            transition: border-color var(--transition-speed);
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        button:hover {
            background: #ff2b73;
        }

        /* Blobs */
        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(100px);
            z-index: 1;
            opacity: 0.15;
            pointer-events: none;
        }
        .blob-1 { top: -200px; left: -200px; }
        .blob-2 { bottom: -200px; right: -200px; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <header>
            <h1>8-Stream Control Center</h1>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">최대 8개의 라이브 영상을 동시에 제어하세요</p>
            
            <div class="status-bar">
                <div class="badge visitor-badge">
                    <span>누적 방문수:</span>
                    <span id="visitorCount" style="color: white; font-weight: 600;">0</span>
                </div>
                <div class="badge live-badge">
                    <div class="dot"></div>
                    <span>LIVE:</span>
                    <span id="liveViewers">1,248</span>
                </div>
            </div>
        </header>

        <div class="grid-container" id="videoGrid">
            <!-- Slots will be generated here -->
        </div>
    </div>

    <script>
        const defaultUrls = [
            "https://www.youtube.com/watch?v=rnXIjl_Rzy4",
            "https://www.youtube.com/watch?v=7ixtrNQHvpE",
            "https://www.youtube.com/watch?v=HfgIFGbdGJ0",
            "https://www.youtube.com/watch?v=M3EYAY2MftI",
            "https://www.youtube.com/watch?v=FBYUkqutqzE",
            "https://www.youtube.com/watch?v=Cp4RRAEgpeU",
            "https://www.youtube.com/watch?v=sWasdbDVNvc",
            "https://www.youtube.com/watch?v=WvXqIorR2KM"
        ];

        function createVideoCard(index, url) {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="video-wrapper">
                    <iframe id="iframe${index}" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="card-controls">
                    <input type="text" id="url${index}" value="${url}" placeholder="YouTube URL">
                    <button onclick="updateVideo(${index})">변경</button>
                </div>
            `;
            return card;
        }

        function extractVideoID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const liveRegExp = /youtube\.com\/live\/([^#&?]*)/;
            
            let match = url.match(regExp);
            if (match && match[7].length == 11) return match[7];
            
            match = url.match(liveRegExp);
            if (match && match[1].length == 11) return match[1];
            
            return null;
        }

        function updateVideo(index) {
            const urlInput = document.getElementById(`url${index}`);
            const iframe = document.getElementById(`iframe${index}`);
            const videoId = extractVideoID(urlInput.value.trim());

            if (videoId) {
                iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1`;
            } else {
                alert('올바른 유튜브 링크를 입력해주세요.');
            }
        }

        function initDashboard() {
            // 1. Visitor Count
            let visits = localStorage.getItem('visitor_count') || 0;
            visits = parseInt(visits) + 1;
            localStorage.setItem('visitor_count', visits);
            document.getElementById('visitorCount').textContent = visits.toLocaleString();

            // 2. Simulated Live Viewers
            function updateLiveViewers() {
                const base = 2400;
                const random = Math.floor(Math.random() * 200);
                document.getElementById('liveViewers').textContent = (base + random).toLocaleString();
            }
            setInterval(updateLiveViewers, 3000);
            updateLiveViewers();

            // 3. Generate Grid
            const grid = document.getElementById('videoGrid');
            defaultUrls.forEach((url, i) => {
                grid.appendChild(createVideoCard(i, url));
                updateVideo(i);
            });

            // 4. Enter key support
            grid.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                    const id = e.target.id.replace('url', '');
                    updateVideo(id);
                }
            });
        }

        window.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
